<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>凌霄长廊语音导览</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="scene">
    <div class="shade"></div>
    <section class="panel" aria-label="凌霄长廊语音导览">
      <div class="kicker">京博木基 · 园林导览</div>
      <h1 id="title">凌霄长廊</h1>
      <p id="subtitle" class="subtitle">花荫廊道 · 39 米沉浸式步行景观</p>

      <div class="player">
        <button id="playButton" class="play-button" type="button" aria-label="播放或暂停">
          <span id="playIcon">▶</span>
        </button>
        <div class="track">
          <div class="track-top">
            <span id="status">准备播放</span>
            <span id="time">00:00 / 00:00</span>
          </div>
          <input id="seek" type="range" min="0" max="1000" value="0" aria-label="播放进度">
        </div>
      </div>

      <div id="captions" class="captions" aria-live="polite"></div>
    </section>
  </main>

  <audio id="audio" preload="metadata"></audio>
  <script src="script.js"></script>
</body>
</html>
